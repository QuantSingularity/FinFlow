worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/m;

    # Upstream definitions
    upstream auth_service {
        server auth-service:4000;
        keepalive 32;
    }

    upstream payments_service {
        server payments-service:4002;
        keepalive 32;
    }

    upstream accounting_service {
        server accounting-service:4003;
        keepalive 32;
    }

    upstream analytics_service {
        server analytics-service:4004;
        keepalive 32;
    }

    upstream credit_engine {
        server credit-engine:8000;
        keepalive 32;
    }

    upstream transaction_service {
        server transaction-service-py:8001;
        keepalive 32;
    }

    upstream ai_features_service {
        server ai-features-service:8002;
        keepalive 32;
    }

    upstream compliance_service {
        server compliance-service:8003;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy same-origin always;

        # Gateway health check
        location /health {
            return 200 '{"status":"ok","service":"nginx-gateway"}';
            add_header Content-Type application/json;
        }

        # Auth routes — tighter rate limit
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Payments routes
        location /api/payments/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://payments_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Stripe webhooks need raw body
            proxy_request_buffering off;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # Accounting routes
        location /api/accounting/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://accounting_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Analytics routes
        location /api/analytics/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://analytics_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # Credit engine routes
        location /api/credit/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://credit_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Transaction service routes
        location /api/transactions/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://transaction_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # AI features routes
        location /api/ai/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://ai_features_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
        }

        # Compliance service routes
        location /api/compliance/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://compliance_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Default — 404
        location / {
            return 404 '{"error":"Route not found"}';
            add_header Content-Type application/json;
        }
    }
}
