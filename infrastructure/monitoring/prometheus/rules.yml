groups:
  - name: finflow-alerts
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
          /
          sum(rate(http_requests_total[5m])) by (service)
          > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate for {{ $labels.service }}"
          description: "Error rate for {{ $labels.service }} is above 5% for the last 5 minutes (current value: {{ $value | humanizePercentage }})"

      - alert: ServiceDown
        expr: up{job=~".*finflow.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} has been down for more than 2 minutes"

      - alert: HighCPUUsage
        expr: |
          sum(rate(container_cpu_usage_seconds_total{namespace="finflow-prod", container!=""}[5m])) by (pod, container)
          /
          sum(container_spec_cpu_quota{namespace="finflow-prod", container!=""} / container_spec_cpu_period{namespace="finflow-prod", container!=""}) by (pod, container)
          > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage in {{ $labels.pod }}/{{ $labels.container }}"
          description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is using more than 80% of its CPU limit (current: {{ $value | humanizePercentage }})"

      - alert: HighMemoryUsage
        expr: |
          container_memory_working_set_bytes{namespace="finflow-prod", container!=""}
          /
          container_spec_memory_limit_bytes{namespace="finflow-prod", container!="", container_spec_memory_limit_bytes > 0}
          > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage in {{ $labels.pod }}/{{ $labels.container }}"
          description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is using more than 80% of its memory limit (current: {{ $value | humanizePercentage }})"

      - alert: PersistentVolumeUsage
        expr: |
          kubelet_volume_stats_used_bytes
          /
          kubelet_volume_stats_capacity_bytes
          > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High PV usage for {{ $labels.persistentvolumeclaim }}"
          description: "PersistentVolume {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"

      - alert: DatabaseConnectionErrors
        expr: rate(database_connection_errors_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection errors detected"
          description: "Service {{ $labels.service }} is experiencing database connection errors (rate: {{ $value }})"

      - alert: KafkaConsumerLag
        expr: kafka_consumer_group_lag > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer group {{ $labels.group }} on topic {{ $labels.topic }} has a lag of {{ $value }}"

      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total{namespace="finflow-prod"}[15m]) * 60 * 15 > 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted more than 3 times in the last 15 minutes"

      - alert: DeploymentReplicasMismatch
        expr: |
          kube_deployment_spec_replicas{namespace="finflow-prod"}
          != kube_deployment_status_available_replicas{namespace="finflow-prod"}
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Deployment {{ $labels.deployment }} replica mismatch"
          description: "Deployment {{ $labels.deployment }} has {{ $value }} available replicas, expected {{ $labels.spec_replicas }}"

      - alert: SlowAPIResponse
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{namespace="finflow-prod"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow API responses for {{ $labels.service }}"
          description: "95th percentile response time for {{ $labels.service }} is above 2s (current: {{ $value }}s)"
