name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1 -- Code Quality Checks
  # ============================================================
  code_quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ---------------------------------------------------------
      # Global Formatting & Quality Checks
      # ---------------------------------------------------------
      - name: Install Global Formatters
        run: npm install -g prettier prettier-plugin-solidity

      - name: Run Global Quality Check
        shell: bash
        run: |
          set -euo pipefail
          NODE_GLOBAL=$(npm root -g)
          echo "=== Running Quality Check across entire repo ==="
          prettier --plugin="$NODE_GLOBAL/prettier-plugin-solidity/dist/index.js" \
            --check "**/*.{js,jsx,ts,tsx,json,html,css,md,sol,yml,yaml}"

      - name: Quality checks complete
        run: echo "All formatting and quality checks completed successfully."

  # ============================================================
  # Job 2 -- Backend Tests
  # ============================================================
  backend_tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: code_quality

    env:
      BACKEND_DIR: code/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: code/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm install

      - name: Run backend test suite
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          set -euo pipefail
          echo "=== Running backend tests across all workspaces ==="
          npm run test --workspaces --if-present -- \
            --coverage \
            --passWithNoTests \
            --forceExit

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-reports
          path: |
            ${{ env.BACKEND_DIR }}/**/coverage/
          retention-days: 30

  # ============================================================
  # Job 3 -- Web Build
  # ============================================================
  web_build:
    name: Web Build
    runs-on: ubuntu-latest
    needs: code_quality

    defaults:
      run:
        working-directory: web-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web-frontend/dist/
          retention-days: 7
