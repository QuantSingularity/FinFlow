name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  code_quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    env:
      BACKEND_DIR: code/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------------------
      # Node Setup & Backend Deps (for ESLint/Tests)
      # ---------------------------------------------------------
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: code/backend/package-lock.json

      - name: Install backend dependencies
        if: hashFiles('code/backend/package-lock.json') != ''
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm install

      - name: Check backend TypeScript linting
        shell: bash
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          set -euo pipefail
          echo "=== Running ESLint across backend workspaces ==="
          npm run lint --workspaces --if-present

      # ---------------------------------------------------------
      # Global Formatting (Replaces the deleted 'tools' logic)
      # ---------------------------------------------------------
      - name: Install Global Prettier & Solidity Plugin
        run: npm install -g prettier prettier-plugin-solidity

      - name: Run Global Prettier Check
        shell: bash
        run: |
          set -euo pipefail
          NODE_GLOBAL=$(npm root -g)
          echo "=== Running Prettier check across entire repo ==="
          prettier --plugin="$NODE_GLOBAL/prettier-plugin-solidity/dist/index.js" \
            --check "**/*.{js,jsx,ts,tsx,json,html,css,md,sol,yml,yaml}"

      - name: Quality checks complete
        run: echo "All formatting and linting checks completed successfully."

  backend_tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: code_quality

    env:
      BACKEND_DIR: code/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: code/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm install

      - name: Run backend test suite
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          set -euo pipefail
          echo "=== Running backend tests across all workspaces ==="
          npm run test --workspaces --if-present -- \
            --coverage \
            --passWithNoTests \
            --forceExit

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-reports
          path: |
            ${{ env.BACKEND_DIR }}/**/coverage/
          retention-days: 30
