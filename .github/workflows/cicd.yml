name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  code_quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    env:
      BACKEND_DIR: code/backend
      WEB_FRONTEND_DIR: web-frontend
      MOBILE_FRONTEND_DIR: mobile-frontend
      INFRASTRUCTURE_DIR: infrastructure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            tools/package-lock.json
            code/backend/package-lock.json

      - name: Install Node dependencies (tools)
        working-directory: tools
        run: npm ci

      - name: Install backend dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm ci

      - name: Check backend TypeScript linting
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "${BACKEND_DIR}" ]; then
            echo "Backend directory '${BACKEND_DIR}' not found — skipping TypeScript linting."
            exit 0
          fi
          echo "=== Running ESLint across all workspaces ==="
          npm run lint --workspaces --if-present
        working-directory: ${{ env.BACKEND_DIR }}

      - name: Check web frontend formatting
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "${WEB_FRONTEND_DIR}" ]; then
            echo "=== Running Prettier (web frontend) ==="
            npx --prefix tools prettier --check "${WEB_FRONTEND_DIR}/**/*.{js,jsx,ts,tsx,json,html,css,md}" --ignore-path tools/.prettierrc
          else
            echo "Web frontend directory not found — skipping."
          fi

      - name: Check mobile frontend formatting
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "${MOBILE_FRONTEND_DIR}" ]; then
            echo "=== Running Prettier (mobile frontend) ==="
            npx --prefix tools prettier --check "${MOBILE_FRONTEND_DIR}/**/*.{js,jsx,ts,tsx,json,html,css,md}" --ignore-path tools/.prettierrc
          else
            echo "Mobile frontend directory not found — skipping."
          fi

      - name: Check markdown formatting
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Running Prettier (all markdown files) ==="
          npx --prefix tools prettier --check "**/*.md" --ignore-path tools/.prettierrc

      - name: Check infrastructure YAML formatting
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "${INFRASTRUCTURE_DIR}" ]; then
            echo "=== Running Prettier (infrastructure YAML/YML) ==="
            npx --prefix tools prettier --check "${INFRASTRUCTURE_DIR}/**/*.{yml,yaml}" --ignore-path tools/.prettierrc
          else
            echo "Infrastructure directory not found — skipping."
          fi

      - name: Quality checks complete
        run: echo "All formatting checks completed successfully."

  backend_tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: code_quality

    env:
      BACKEND_DIR: code/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: code/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: npm ci

      - name: Run backend test suite
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          set -euo pipefail
          echo "=== Running backend tests across all workspaces ==="
          npm run test --workspaces --if-present -- \
            --coverage \
            --passWithNoTests \
            --forceExit

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-reports
          path: ${{ env.BACKEND_DIR }}/*/coverage/
          retention-days: 30

      - name: Backend tests complete
        run: echo "All backend tests completed successfully."
